  <script type="application/json" id="__site__">{"site":{"title":"wireweave","tagline":"nostr + webrtc. the networking layer for 247420.","description":"wireweave is the networking layer pulled out of zellous. p2p voice, chat, channels, servers, ban/role/settings — every byte moves through public nostr relays. import, wire, ship.","repo":"https://github.com/AnEntrypoint/wireweave","url":"https://anentrypoint.github.io/wireweave/","year":2026,"accent_from":"#247420","accent_to":"#3A9A34","glyph":"⌇","code":"031","category":"voice"},"nav":{"links":[{"label":"docs","href":"#docs"},{"label":"api","href":"#api"},{"label":"install","href":"#install"},{"label":"GitHub","href":"https://github.com/AnEntrypoint/wireweave"}]},"home":{"id":"home","title":"Home","hero":{"heading":"wireweave","subheading":"serverless nostr + WebRTC voice + binary-data SDK","body":"wireweave is the networking layer for 247420 projects. peer-to-peer voice, video, chat, channels, servers, ban/role/settings, and binary RTCDataChannel — every byte moves through public nostr relays. no backend required.","badges":[{"label":"nostr"},{"label":"webrtc"},{"label":"voice"},{"label":"data"},{"label":"sdk"}],"ctas":[{"label":"view on npm","href":"https://www.npmjs.com/package/wireweave","primary":true},{"label":"github","href":"https://github.com/AnEntrypoint/wireweave"}]},"features":{"heading":"Why wireweave","items":[{"name":"peer-to-peer over nostr","desc":"every byte signals through public nostr relays — no backend, no auth server, no rendezvous service to operate.","meta":"serverless"},{"name":"every submodule is an EventTarget","desc":"subscribe to any surface with addEventListener — voice, chat, channels, servers, bans, roles, all uniform.","meta":"uniform api"},{"name":"perfect-negotiation WebRTC voice","desc":"RFC 8840 perfect negotiation, ICE restart on disconnect, track-stall detection, exponential-backoff reconnect.","meta":"rfc 8840"},{"name":"binary DataSession channels","desc":"ordered binary RTCDataChannel for game frames, file sync, anything ArrayBuffer-shaped — no media, no mic prompt, no SFU.","meta":"p2p binary"},{"name":"capacity-weighted SFU hub election","desc":"mesh up to 3 peers, then deterministic election promotes the highest-capacity peer to SFU star — no central server.","meta":"mesh -\u003e star"},{"name":"no backend required","desc":"ship a static page. wireweave talks to live public relays and live webrtc peers from the first line.","meta":"flatspace-friendly"},{"name":"singleplayer mode","desc":"VoiceSession keyed by location.hash — people on the same URL voice-chat; game state stays in a Worker.","meta":"in-page"},{"name":"webrtc host \u0026 join mode","desc":"DataSession for game frames + VoiceSession for voice, both signaled through the same nostr relays.","meta":"p2p"},{"name":"self-hosted server mode","desc":"server runs its own transport for state; DataSession adds player-to-player p2p (voice + side-channel data) over nostr.","meta":"hybrid"}]},"install":{"heading":"Install","body":"wireweave ships as a single esm package. every subsystem is its own export so you tree-shake whatever you do not use. each module is also exported via subpath: wireweave/relay-pool, wireweave/voice, wireweave/data, wireweave/chat, etc.","code":[{"kind":"cmt","text":"# install"},{"kind":"cmd","text":"npm i wireweave nostr-tools"},{"kind":"cmt","text":""},{"kind":"cmt","text":"# one-liner setup (browser)"},{"kind":"cmd","text":"import { createWireweave } from 'wireweave';"},{"kind":"cmd","text":"import * as NostrTools from 'nostr-tools';"},{"kind":"cmd","text":"import * as XState from 'xstate';"},{"kind":"cmd","text":"const ww = createWireweave({ nostrTools: NostrTools, xstate: XState });"},{"kind":"cmd","text":"ww.pool.connect();"},{"kind":"cmd","text":"ww.auth.loadFromStorage() || ww.auth.generateKey();"},{"kind":"cmd","text":"ww.servers.init();"},{"kind":"cmt","text":""},{"kind":"cmt","text":"# named imports"},{"kind":"cmd","text":"import { RelayPool, NostrAuth, VoiceSession, DataSession,"},{"kind":"cmd","text":"  Chat, Channels, Servers, Bans, Roles, Settings, Media,"},{"kind":"cmd","text":"  Pages, MessageBus, createFSM } from 'wireweave';"}]},"api":{"heading":"API","body":"no fake relays. no stubs. wireweave talks to live public nostr relays and live webrtc peers from the first line. the api is EventTarget all the way down. ww exposes: pool, auth, fsm, message, bans, roles, settings, pages, media, channels, servers, chat, voice (lazy via ensureVoice()), and setCurrentChannel().","code":[{"kind":"cmt","text":"# voice (webrtc mesh + sfu hub election)"},{"kind":"cmd","text":"const voice = ww.ensureVoice({"},{"kind":"cmd","text":"  serverId: 'abc:xyz',"},{"kind":"cmd","text":"  displayName: 'you',"},{"kind":"cmd","text":"  onAudioTrack: ({ peer, stream }) =\u003e {"},{"kind":"cmd","text":"    const a = new Audio();"},{"kind":"cmd","text":"    a.srcObject = stream; a.autoplay = true;"},{"kind":"cmd","text":"    document.body.appendChild(a); peer.audioEl = a;"},{"kind":"cmd","text":"  },"},{"kind":"cmd","text":"  onVideoTrack: ({ peerPubkey, stream }) =\u003e { /* attach */ }"},{"kind":"cmd","text":"});"},{"kind":"cmd","text":"await voice.connect('general-voice', { displayName: 'you' });"},{"kind":"cmd","text":"voice.toggleMic(); voice.toggleDeafen();"},{"kind":"cmd","text":"voice.addEventListener('participants', e =\u003e console.log(e.detail.list));"},{"kind":"cmt","text":""},{"kind":"cmt","text":"# DataSession (binary p2p) — ordered RTCDataChannel only"},{"kind":"cmd","text":"import { createDataSession, createFSM, NostrAuth, RelayPool } from 'wireweave';"},{"kind":"cmd","text":"const fsm = createFSM(xstate);"},{"kind":"cmd","text":"const auth = new NostrAuth({ nostrTools });"},{"kind":"cmd","text":"auth.loadFromStorage() || auth.generateKey();"},{"kind":"cmd","text":"const pool = new RelayPool({ verifyEvent: nostrTools.verifyEvent });"},{"kind":"cmd","text":"pool.connect();"},{"kind":"cmd","text":"const session = createDataSession({ fsm, xstate, relayPool: pool, auth, namespace: 'mygame' });"},{"kind":"cmd","text":"session.addEventListener('peer-open', e =\u003e console.log('peer up', e.detail.peerPubkey));"},{"kind":"cmd","text":"session.addEventListener('data',      e =\u003e handleFrame(e.detail.peerPubkey, e.detail.data));"},{"kind":"cmd","text":"session.addEventListener('peer-close', e =\u003e console.log('peer down', e.detail.peerPubkey));"},{"kind":"cmd","text":"await session.connect('lobby-7');"},{"kind":"cmd","text":"session.broadcast(new Uint8Array(payload));"},{"kind":"cmd","text":"session.send(somePeerPubkey, new Uint8Array(p));"},{"kind":"cmt","text":""},{"kind":"cmt","text":"# node usage (relay + auth only)"},{"kind":"cmd","text":"import WebSocket from 'ws';"},{"kind":"cmd","text":"import { RelayPool, NostrAuth } from 'wireweave';"},{"kind":"cmd","text":"import * as NostrTools from 'nostr-tools';"},{"kind":"cmd","text":"const pool = new RelayPool({"},{"kind":"cmd","text":"  relays: ['wss://relay.damus.io'],"},{"kind":"cmd","text":"  verifyEvent: NostrTools.verifyEvent,"},{"kind":"cmd","text":"  WebSocketImpl: WebSocket"},{"kind":"cmd","text":"});"},{"kind":"cmd","text":"const auth = new NostrAuth({ nostrTools: NostrTools });"}]},"modules":{"heading":"Modules","items":[{"name":"voice","sub":"perfect negotiation, ice restart, track-stall detection, capacity-weighted hub election.","meta":"rtc + sfu","href":"https://github.com/AnEntrypoint/wireweave/blob/master/src/voice.js"},{"name":"data","sub":"binary p2p RTCDataChannel — ordered, ArrayBuffer-shaped. game frames, file sync, no media, no mic.","meta":"p2p binary","href":"https://github.com/AnEntrypoint/wireweave/blob/master/src/data.js"},{"name":"chat","sub":"public channels, replies, reactions. kinds 42 + 7.","meta":"nip-28","href":"https://github.com/AnEntrypoint/wireweave/blob/master/src/chat.js"},{"name":"servers","sub":"community events, invite links, owner rename, delete.","meta":"nip-72","href":"https://github.com/AnEntrypoint/wireweave/blob/master/src/servers.js"},{"name":"channels","sub":"parameterized replaceable channel list per server.","meta":"30078","href":"https://github.com/AnEntrypoint/wireweave/blob/master/src/channels.js"},{"name":"roles","sub":"role events keyed by server id + pubkey.","meta":"owner / admin / mod","href":"https://github.com/AnEntrypoint/wireweave/blob/master/src/roles.js"},{"name":"bans","sub":"signed ban events with expiry. kick-from-voice on top.","meta":"ban / timeout / kick","href":"https://github.com/AnEntrypoint/wireweave/blob/master/src/bans.js"},{"name":"settings","sub":"bitrate, embed allowlist, arbitrary key/value.","meta":"per-server","href":"https://github.com/AnEntrypoint/wireweave/blob/master/src/settings.js"},{"name":"media","sub":"nip-98 auth upload to any blossom server. cdn mirror list.","meta":"blossom","href":"https://github.com/AnEntrypoint/wireweave/blob/master/src/media.js"},{"name":"auth","sub":"extension first, local nsec fallback, stored in provided storage.","meta":"nip-07 / nsec","href":"https://github.com/AnEntrypoint/wireweave/blob/master/src/auth.js"},{"name":"relay-pool","sub":"multi-relay fallback, reconnect, verifyEvent hook, pluggable WebSocket.","meta":"transport","href":"https://github.com/AnEntrypoint/wireweave/blob/master/src/relay-pool.js"},{"name":"fsm","sub":"voice, peer, relay, sfu, camera — every state machine exported.","meta":"xstate v5","href":"https://github.com/AnEntrypoint/wireweave/blob/master/src/fsm.js"}]},"quickstart":{"heading":"Quick start","lines":[{"kind":"cmt","text":"# install"},{"kind":"cmd","text":"npm i wireweave nostr-tools"},{"kind":"cmt","text":""},{"kind":"cmt","text":"# source"},{"kind":"cmd","text":"git clone https://github.com/AnEntrypoint/wireweave.git"},{"kind":"cmt","text":""},{"kind":"cmt","text":"# test (real round-trip against public relays)"},{"kind":"cmd","text":"npm test"}]},"examples":{"heading":"Examples","items":[{"name":"DataSession — binary p2p","desc":"ordered RTCDataChannel for game frames and ArrayBuffer payloads, signaled over nostr.","cta":"readme","href":"https://github.com/AnEntrypoint/wireweave#data-sessions-binary-p2p"},{"name":"VoiceSession — ensureVoice()","desc":"perfect-negotiation mesh + capacity-weighted SFU hub election with audio + video tracks.","cta":"readme","href":"https://github.com/AnEntrypoint/wireweave#voice-webrtc-mesh--sfu-hub-election"},{"name":"Node — relay + auth","desc":"RelayPool + NostrAuth in node with the ws package as WebSocketImpl.","cta":"readme","href":"https://github.com/AnEntrypoint/wireweave#node-usage-relay--auth-only"},{"name":"3-mode game pattern","desc":"singleplayer (in-page) / webrtc host \u0026 join / self-hosted server — same SDK, three transport flavours.","cta":"readme","href":"https://github.com/AnEntrypoint/wireweave#game--3-mode-usage-pattern"}]}}}</script>
  <script type="module">
import { h, applyDiff, installStyles, components as C } from 'anentrypoint-design';
installStyles();
document.documentElement.classList.add('ds-247420');

const data = JSON.parse(document.getElementById('__site__').textContent);
const { site, nav, home } = data;

function Hero() {
  if (!home || !home.hero) return null;
  return C.Panel({
    style: 'margin:8px',
    children: h('div', { style: 'padding:24px 22px' },
      C.Heading({ level: 1, style: 'margin:0 0 8px 0', children: home.hero.heading || site.title }),
      home.hero.subheading ? C.Lede({ children: home.hero.subheading }) : null,
      home.hero.body ? h('p', { style: 'margin:8px 0 16px 0;color:var(--panel-text-2);max-width:64ch' }, home.hero.body) : null,
      (home.hero.badges && home.hero.badges.length) ? h('div', { style: 'display:flex;gap:6px;flex-wrap:wrap;margin:0 0 12px 0' },
        ...home.hero.badges.map((b, i) => C.Chip({ key: 'b' + i, children: b.label }))
      ) : null,
      (home.hero.ctas && home.hero.ctas.length) ? h('div', { style: 'display:flex;gap:8px;flex-wrap:wrap' },
        ...home.hero.ctas.map((c, i) => C.Btn({ key: 'c' + i, href: c.href, primary: c.primary, children: c.label }))
      ) : null
    )
  });
}

function Features() {
  if (!home || !home.features || !home.features.items || !home.features.items.length) return null;
  const rows = home.features.items.map((it, i) => C.RowLink({
    key: 'f' + i,
    code: String(i + 1).padStart(2, '0'),
    title: it.name,
    sub: it.desc || '',
    meta: it.meta || '',
    href: it.href || '#'
  }));
  return C.Panel({
    title: home.features.heading || 'features',
    style: 'margin:8px',
    children: rows
  });
}

function Quickstart() {
  if (!home || !home.quickstart || !home.quickstart.lines || !home.quickstart.lines.length) return null;
  const lineNodes = home.quickstart.lines.map((l, i) => {
    const isComment = l.kind === 'cmt';
    return h('div', { key: 'q' + i, class: 'cli' },
      h('span', { class: 'prompt' }, isComment ? '#' : '$'),
      h('span', { class: 'cmd' }, l.text)
    );
  });
  return C.Panel({
    title: home.quickstart.heading || 'quick start',
    style: 'margin:8px',
    children: h('div', { style: 'padding:16px 22px' }, ...lineNodes)
  });
}

function CodeBlock({ lines }) {
  if (!lines || !lines.length) return null;
  const nodes = lines.map((l, i) => {
    const isComment = l.kind === 'cmt';
    return h('div', { key: 'q' + i, class: 'cli' },
      h('span', { class: 'prompt' }, isComment ? '#' : '$'),
      h('span', { class: 'cmd' }, l.text)
    );
  });
  return h('div', { style: 'padding:16px 22px' }, ...nodes);
}

function Modules() {
  if (!home || !home.modules || !home.modules.items || !home.modules.items.length) return null;
  const rows = home.modules.items.map((it, i) => C.RowLink({
    key: 'm' + i,
    code: String(i + 1).padStart(2, '0'),
    title: it.name,
    sub: it.sub || '',
    meta: it.meta || '',
    href: it.href || '#'
  }));
  return C.Panel({
    title: home.modules.heading || 'modules',
    style: 'margin:8px',
    children: rows
  });
}

function Install() {
  if (!home || !home.install) return null;
  return C.Panel({
    title: home.install.heading || 'install',
    style: 'margin:8px',
    children: [
      home.install.body ? h('p', { style: 'margin:0 0 12px 0;color:var(--panel-text-2);max-width:60ch' }, home.install.body) : null,
      home.install.code ? CodeBlock({ lines: home.install.code }) : null
    ].filter(Boolean)
  });
}

function Api() {
  if (!home || !home.api) return null;
  return C.Panel({
    title: home.api.heading || 'api',
    style: 'margin:8px',
    children: [
      home.api.body ? h('p', { style: 'margin:0 0 12px 0;color:var(--panel-text-2);max-width:60ch' }, home.api.body) : null,
      home.api.code ? CodeBlock({ lines: home.api.code }) : null
    ].filter(Boolean)
  });
}

function Examples() {
  if (!home || !home.examples || !home.examples.items || !home.examples.items.length) return null;
  const rows = home.examples.items.map((it, i) => C.RowLink({
    key: 'e' + i,
    title: it.name,
    sub: it.desc || '',
    meta: it.cta || 'open',
    href: it.href || '#'
  }));
  return C.Panel({
    title: home.examples.heading || 'examples',
    style: 'margin:8px',
    children: rows
  });
}

function Footer() {
  return h('footer', { class: 'app-status' },
    h('span', { class: 'item' }, 'styled with '),
    h('a', { class: 'item', href: 'https://anentrypoint.github.io/design/' }, 'anentrypoint-design'),
    h('span', { class: 'item' }, '·'),
    h('a', { class: 'item', href: 'https://247420.xyz' }, '247420.xyz'),
    h('span', { class: 'spread' }),
    site.repo ? h('a', { class: 'item', href: site.repo }, 'source ↗') : null
  );
}

const navItems = (nav && nav.links ? nav.links : []).map(l => [String(l.label || ''), l.href]);

const App = C.AppShell({
   topbar: C.Topbar({
     brand: '247420',
     leaf: site.title || '',
     items: navItems
   }),
   crumb: C.Crumb({
     trail: ['247420'],
     leaf: site.title || ''
   }),
   main: h('div', {},
     Hero(),
     Install(),
     Api(),
     Features(),
     Modules(),
     Quickstart(),
     Examples()
   ),
   status: Footer()
 });

applyDiff(document.getElementById('app'), [App]);
</script>
</body>
