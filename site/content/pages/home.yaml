id: home
title: Home
hero:
  heading: "wireweave"
  subheading: "serverless nostr + WebRTC voice + binary-data SDK"
  body: "wireweave is the networking layer for 247420 projects. peer-to-peer voice, video, chat, channels, servers, ban/role/settings, and binary RTCDataChannel — every byte moves through public nostr relays. no backend required."
  badges:
    - { label: "nostr" }
    - { label: "webrtc" }
    - { label: "voice" }
    - { label: "data" }
    - { label: "sdk" }
  ctas:
    - { label: "view on npm", href: "https://www.npmjs.com/package/wireweave", primary: true }
    - { label: "github", href: "https://github.com/AnEntrypoint/wireweave" }
features:
  heading: "Why wireweave"
  items:
    - { name: "peer-to-peer over nostr", desc: "every byte signals through public nostr relays — no backend, no auth server, no rendezvous service to operate.", meta: "serverless" }
    - { name: "every submodule is an EventTarget", desc: "subscribe to any surface with addEventListener — voice, chat, channels, servers, bans, roles, all uniform.", meta: "uniform api" }
    - { name: "perfect-negotiation WebRTC voice", desc: "RFC 8840 perfect negotiation, ICE restart on disconnect, track-stall detection, exponential-backoff reconnect.", meta: "rfc 8840" }
    - { name: "binary DataSession channels", desc: "ordered binary RTCDataChannel for game frames, file sync, anything ArrayBuffer-shaped — no media, no mic prompt, no SFU.", meta: "p2p binary" }
    - { name: "capacity-weighted SFU hub election", desc: "mesh up to 3 peers, then deterministic election promotes the highest-capacity peer to SFU star — no central server.", meta: "mesh -> star" }
    - { name: "no backend required", desc: "ship a static page. wireweave talks to live public relays and live webrtc peers from the first line.", meta: "flatspace-friendly" }
    - { name: "singleplayer mode", desc: "VoiceSession keyed by location.hash — people on the same URL voice-chat; game state stays in a Worker.", meta: "in-page" }
    - { name: "webrtc host & join mode", desc: "DataSession for game frames + VoiceSession for voice, both signaled through the same nostr relays.", meta: "p2p" }
    - { name: "self-hosted server mode", desc: "server runs its own transport for state; DataSession adds player-to-player p2p (voice + side-channel data) over nostr.", meta: "hybrid" }
install:
  heading: Install
  body: "wireweave ships as a single esm package. every subsystem is its own export so you tree-shake whatever you do not use. each module is also exported via subpath: wireweave/relay-pool, wireweave/voice, wireweave/data, wireweave/chat, etc."
  code:
    - { kind: "cmt", text: "# install" }
    - { kind: "cmd", text: "npm i wireweave nostr-tools" }
    - { kind: "cmt", text: "" }
    - { kind: "cmt", text: "# one-liner setup (browser)" }
    - { kind: "cmd", text: "import { createWireweave } from 'wireweave';" }
    - { kind: "cmd", text: "import * as NostrTools from 'nostr-tools';" }
    - { kind: "cmd", text: "import * as XState from 'xstate';" }
    - { kind: "cmd", text: "const ww = createWireweave({ nostrTools: NostrTools, xstate: XState });" }
    - { kind: "cmd", text: "ww.pool.connect();" }
    - { kind: "cmd", text: "ww.auth.loadFromStorage() || ww.auth.generateKey();" }
    - { kind: "cmd", text: "ww.servers.init();" }
    - { kind: "cmt", text: "" }
    - { kind: "cmt", text: "# named imports" }
    - { kind: "cmd", text: "import { RelayPool, NostrAuth, VoiceSession, DataSession," }
    - { kind: "cmd", text: "  Chat, Channels, Servers, Bans, Roles, Settings, Media," }
    - { kind: "cmd", text: "  Pages, MessageBus, createFSM } from 'wireweave';" }
api:
  heading: API
  body: "no fake relays. no stubs. wireweave talks to live public nostr relays and live webrtc peers from the first line. the api is EventTarget all the way down. ww exposes: pool, auth, fsm, message, bans, roles, settings, pages, media, channels, servers, chat, voice (lazy via ensureVoice()), and setCurrentChannel()."
  code:
    - { kind: "cmt", text: "# voice (webrtc mesh + sfu hub election)" }
    - { kind: "cmd", text: "const voice = ww.ensureVoice({" }
    - { kind: "cmd", text: "  serverId: 'abc:xyz'," }
    - { kind: "cmd", text: "  displayName: 'you'," }
    - { kind: "cmd", text: "  onAudioTrack: ({ peer, stream }) => {" }
    - { kind: "cmd", text: "    const a = new Audio();" }
    - { kind: "cmd", text: "    a.srcObject = stream; a.autoplay = true;" }
    - { kind: "cmd", text: "    document.body.appendChild(a); peer.audioEl = a;" }
    - { kind: "cmd", text: "  }," }
    - { kind: "cmd", text: "  onVideoTrack: ({ peerPubkey, stream }) => { /* attach */ }" }
    - { kind: "cmd", text: "});" }
    - { kind: "cmd", text: "await voice.connect('general-voice', { displayName: 'you' });" }
    - { kind: "cmd", text: "voice.toggleMic(); voice.toggleDeafen();" }
    - { kind: "cmd", text: "voice.addEventListener('participants', e => console.log(e.detail.list));" }
    - { kind: "cmt", text: "" }
    - { kind: "cmt", text: "# DataSession (binary p2p) — ordered RTCDataChannel only" }
    - { kind: "cmd", text: "import { createDataSession, createFSM, NostrAuth, RelayPool } from 'wireweave';" }
    - { kind: "cmd", text: "const fsm = createFSM(xstate);" }
    - { kind: "cmd", text: "const auth = new NostrAuth({ nostrTools });" }
    - { kind: "cmd", text: "auth.loadFromStorage() || auth.generateKey();" }
    - { kind: "cmd", text: "const pool = new RelayPool({ verifyEvent: nostrTools.verifyEvent });" }
    - { kind: "cmd", text: "pool.connect();" }
    - { kind: "cmd", text: "const session = createDataSession({ fsm, xstate, relayPool: pool, auth, namespace: 'mygame' });" }
    - { kind: "cmd", text: "session.addEventListener('peer-open', e => console.log('peer up', e.detail.peerPubkey));" }
    - { kind: "cmd", text: "session.addEventListener('data',      e => handleFrame(e.detail.peerPubkey, e.detail.data));" }
    - { kind: "cmd", text: "session.addEventListener('peer-close', e => console.log('peer down', e.detail.peerPubkey));" }
    - { kind: "cmd", text: "await session.connect('lobby-7');" }
    - { kind: "cmd", text: "session.broadcast(new Uint8Array(payload));" }
    - { kind: "cmd", text: "session.send(somePeerPubkey, new Uint8Array(p));" }
    - { kind: "cmt", text: "" }
    - { kind: "cmt", text: "# node usage (relay + auth only)" }
    - { kind: "cmd", text: "import WebSocket from 'ws';" }
    - { kind: "cmd", text: "import { RelayPool, NostrAuth } from 'wireweave';" }
    - { kind: "cmd", text: "import * as NostrTools from 'nostr-tools';" }
    - { kind: "cmd", text: "const pool = new RelayPool({" }
    - { kind: "cmd", text: "  relays: ['wss://relay.damus.io']," }
    - { kind: "cmd", text: "  verifyEvent: NostrTools.verifyEvent," }
    - { kind: "cmd", text: "  WebSocketImpl: WebSocket" }
    - { kind: "cmd", text: "});" }
    - { kind: "cmd", text: "const auth = new NostrAuth({ nostrTools: NostrTools });" }
modules:
  heading: Modules
  items:
    - { name: "voice", sub: "perfect negotiation, ice restart, track-stall detection, capacity-weighted hub election.", meta: "rtc + sfu", href: "https://github.com/AnEntrypoint/wireweave/blob/master/src/voice.js" }
    - { name: "data", sub: "binary p2p RTCDataChannel — ordered, ArrayBuffer-shaped. game frames, file sync, no media, no mic.", meta: "p2p binary", href: "https://github.com/AnEntrypoint/wireweave/blob/master/src/data.js" }
    - { name: "chat", sub: "public channels, replies, reactions. kinds 42 + 7.", meta: "nip-28", href: "https://github.com/AnEntrypoint/wireweave/blob/master/src/chat.js" }
    - { name: "servers", sub: "community events, invite links, owner rename, delete.", meta: "nip-72", href: "https://github.com/AnEntrypoint/wireweave/blob/master/src/servers.js" }
    - { name: "channels", sub: "parameterized replaceable channel list per server.", meta: "30078", href: "https://github.com/AnEntrypoint/wireweave/blob/master/src/channels.js" }
    - { name: "roles", sub: "role events keyed by server id + pubkey.", meta: "owner / admin / mod", href: "https://github.com/AnEntrypoint/wireweave/blob/master/src/roles.js" }
    - { name: "bans", sub: "signed ban events with expiry. kick-from-voice on top.", meta: "ban / timeout / kick", href: "https://github.com/AnEntrypoint/wireweave/blob/master/src/bans.js" }
    - { name: "settings", sub: "bitrate, embed allowlist, arbitrary key/value.", meta: "per-server", href: "https://github.com/AnEntrypoint/wireweave/blob/master/src/settings.js" }
    - { name: "media", sub: "nip-98 auth upload to any blossom server. cdn mirror list.", meta: "blossom", href: "https://github.com/AnEntrypoint/wireweave/blob/master/src/media.js" }
    - { name: "auth", sub: "extension first, local nsec fallback, stored in provided storage.", meta: "nip-07 / nsec", href: "https://github.com/AnEntrypoint/wireweave/blob/master/src/auth.js" }
    - { name: "relay-pool", sub: "multi-relay fallback, reconnect, verifyEvent hook, pluggable WebSocket.", meta: "transport", href: "https://github.com/AnEntrypoint/wireweave/blob/master/src/relay-pool.js" }
    - { name: "fsm", sub: "voice, peer, relay, sfu, camera — every state machine exported.", meta: "xstate v5", href: "https://github.com/AnEntrypoint/wireweave/blob/master/src/fsm.js" }
quickstart:
  heading: Quick start
  lines:
    - { kind: "cmt", text: "# install" }
    - { kind: "cmd", text: "npm i wireweave nostr-tools" }
    - { kind: "cmt", text: "" }
    - { kind: "cmt", text: "# source" }
    - { kind: "cmd", text: "git clone https://github.com/AnEntrypoint/wireweave.git" }
    - { kind: "cmt", text: "" }
    - { kind: "cmt", text: "# test (real round-trip against public relays)" }
    - { kind: "cmd", text: "npm test" }
examples:
  heading: Examples
  items:
    - { name: "DataSession — binary p2p", desc: "ordered RTCDataChannel for game frames and ArrayBuffer payloads, signaled over nostr.", cta: "readme", href: "https://github.com/AnEntrypoint/wireweave#data-sessions-binary-p2p" }
    - { name: "VoiceSession — ensureVoice()", desc: "perfect-negotiation mesh + capacity-weighted SFU hub election with audio + video tracks.", cta: "readme", href: "https://github.com/AnEntrypoint/wireweave#voice-webrtc-mesh--sfu-hub-election" }
    - { name: "Node — relay + auth", desc: "RelayPool + NostrAuth in node with the ws package as WebSocketImpl.", cta: "readme", href: "https://github.com/AnEntrypoint/wireweave#node-usage-relay--auth-only" }
    - { name: "3-mode game pattern", desc: "singleplayer (in-page) / webrtc host & join / self-hosted server — same SDK, three transport flavours.", cta: "readme", href: "https://github.com/AnEntrypoint/wireweave#game--3-mode-usage-pattern" }
